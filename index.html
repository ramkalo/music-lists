<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Music Lists</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    .markdown-body { line-height: 1.7; }
    .markdown-body h1 { font-size: 1.5rem; font-weight: 700; margin: 1.5rem 0 1rem; color: #fff; }
    .markdown-body h2 { font-size: 1.25rem; font-weight: 600; margin: 1.25rem 0 0.75rem; color: #fff; }
    .markdown-body h3 { font-size: 1.1rem; font-weight: 600; margin: 1rem 0 0.5rem; color: #fff; }
    .markdown-body p { margin: 0.5rem 0; }
    .markdown-body ul, .markdown-body ol { margin: 0.5rem 0; padding-left: 1.5rem; }
    .markdown-body li { margin: 0.25rem 0; }
    .markdown-body ul { list-style-type: disc; }
    .markdown-body ol { list-style-type: decimal; }
    .markdown-body a { color: #60a5fa; text-decoration: underline; }
    .markdown-body blockquote { border-left: 3px solid #52525b; padding-left: 1rem; color: #a1a1aa; margin: 1rem 0; }
    .markdown-body code { background: #27272a; padding: 0.125rem 0.25rem; border-radius: 0.25rem; font-size: 0.875rem; }
    .markdown-body pre { background: #27272a; padding: 1rem; border-radius: 0.5rem; overflow-x: auto; margin: 1rem 0; }
    .markdown-body pre code { background: none; padding: 0; }
    .markdown-body hr { border-color: #3f3f46; margin: 1.5rem 0; }
    .markdown-body table { width: 100%; border-collapse: collapse; margin: 1rem 0; }
    .markdown-body th, .markdown-body td { border: 1px solid #3f3f46; padding: 0.5rem; text-align: left; }
    .markdown-body th { background: #27272a; }
  </style>
</head>
<body class="bg-zinc-900 text-zinc-100 min-h-screen p-8">
  <div class="max-w-2xl mx-auto">
    <h1 class="text-3xl font-bold mb-8">Music Lists</h1>
    <div id="lists" class="space-y-2"></div>
  </div>

  <div id="modal" class="fixed inset-0 bg-black/80 hidden items-center justify-center p-4">
    <div class="bg-zinc-800 rounded-lg max-w-2xl w-full max-h-[80vh] flex flex-col">
      <div class="p-4 border-b border-zinc-700 flex items-center justify-between">
        <h2 id="modal-title" class="text-xl font-bold"></h2>
        <button onclick="closeModal()" class="text-zinc-400 hover:text-white text-2xl">&times;</button>
      </div>
      <div class="p-4 overflow-auto flex-1">
        <div id="modal-content" class="markdown-body text-zinc-300 text-sm"></div>
      </div>
      <div class="p-4 border-t border-zinc-700 flex gap-2">
        <button id="download-md" class="px-4 py-2 bg-zinc-700 hover:bg-zinc-600 rounded">Download .md</button>
        <button id="download-txt" class="px-4 py-2 bg-zinc-700 hover:bg-zinc-600 rounded">Download .txt</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
